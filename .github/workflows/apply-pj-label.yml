name: Apply pj label from Issue Form

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  apply-pj-label:
    runs-on: ubuntu-latest
    steps:
      - name: Extract pj label and apply
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            // GitHub Issue Forms renders each field as:
            // ### <label>\n\n<value>
            const match = body.match(/###\s+🏷\s+pjラベル（必須）\s*\n+([^\n#]+)/);

            if (!match || !match[1].trim()) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  '⚠️ `pjラベル` の入力が見つかりませんでした。',
                  '',
                  '`pj:xxx` の形式（例：`pj:doc-platform`）でフォームの **🏷 pjラベル（必須）** 欄に入力してください💖',
                ].join('\n'),
              });
              return;
            }

            const pjLabelValue = match[1].trim();

            // Validate: must match pj:<word chars and hyphens>
            if (!/^pj:[\w-]+$/.test(pjLabelValue)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: [
                  `⚠️ pjラベルの形式が正しくありません：\`${pjLabelValue}\``,
                  '',
                  '`pj:xxx` の形式（例：`pj:doc-platform`）で入力してください💖',
                  '使用できる文字：英数字・ハイフン（`-`）・アンダースコア（`_`）',
                ].join('\n'),
              });
              return;
            }

            // Collect current pj:* labels on the issue
            const currentLabels = context.payload.issue.labels.map(l => l.name);
            const existingPjLabels = currentLabels.filter(l => /^pj:/.test(l));

            // Already correct — nothing to do
            if (existingPjLabels.length === 1 && existingPjLabels[0] === pjLabelValue) {
              return;
            }

            // Remove stale pj:* labels
            for (const oldLabel of existingPjLabels) {
              if (oldLabel !== pjLabelValue) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: oldLabel,
                  });
                } catch (e) {
                  // Label may have already been removed; ignore 404
                  if (e.status !== 404) throw e;
                }
              }
            }

            // Create the label if it does not exist yet
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: pjLabelValue,
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: pjLabelValue,
                  color: '0075ca',
                  description: 'プロジェクト識別ラベル（自動作成）',
                });
              } else {
                throw e;
              }
            }

            // Apply the pj label
            if (!existingPjLabels.includes(pjLabelValue)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [pjLabelValue],
              });
            }
